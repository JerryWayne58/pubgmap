<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>SQUAD HQ: Global Recon Control</title>
    <style>
        :root { --bg-color: #080b10; --panel-bg: rgba(13, 17, 23, 0.88); --text-color: #c9d1d9; --border-color: #21262d; }
        body, html { margin: 0; width: 100%; height: 100%; overflow: hidden; background: var(--bg-color); font-family: 'Courier New', monospace; color: var(--text-color); }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        .panel { position: absolute; z-index: 10; background: var(--panel-bg); border: 1px solid var(--border-color); padding: 15px; border-radius: 4px; box-sizing: border-box; }
        .left-panel { top: 20px; left: 20px; width: 320px; bottom: 20px; display: flex; flex-direction: column; }
        .right-panel { top: 20px; right: 20px; width: 320px; bottom: 20px; overflow-y: auto; }
        input, select, button { background: #161b22; border: 1px solid var(--border-color); color: #fff; padding: 8px; margin-bottom: 5px; width: 100%; box-sizing: border-box; }
        .btn-action { background: #ffcc00; color: #000; font-weight: bold; cursor: pointer; }
        .admin-only { display: none; }
        .list-item { padding: 8px; border-bottom: 1px solid #161b22; display: flex; justify-content: space-between; }
        .del-btn { color: #ff3366; cursor: pointer; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
    <div id="canvas-container"></div>
    <div class="panel left-panel">
        <h3>ОСВОБОЖДЕНО: <span id="total-count">0</span></h3>
        <input type="password" id="pass-input" placeholder="Код Командира...">
        <button onclick="checkAuth()">ВХОД</button>
        <div id="admin-panel" class="admin-only">
            <input type="text" id="new-name" placeholder="Название объекта">
            <select id="new-type"><option value="city">Населенный пункт</option><option value="spec">Спецоперация</option></select>
            <button class="btn-action" id="submit-btn" onclick="addNewLocation()">ВНЕСТИ В РЕЕСТР</button>
        </div>
        <div id="cities-list"></div>
    </div>
    <div class="panel right-panel"><h3>ТЕКУЩИЕ МИССИИ</h3><div id="missions-list"></div></div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script>
        const db = firebase.database();
        firebase.initializeApp({databaseURL: "https://pubgproject-73a7a-default-rtdb.europe-west1.firebasedatabase.app/"});

        // 3D Инициализация
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({antialias: true});
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        
        const globe = new THREE.Mesh(new THREE.SphereGeometry(5, 64, 64), new THREE.MeshBasicMaterial({color: 0x111111, wireframe: true}));
        scene.add(globe);
        camera.position.z = 15;
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); }
        animate();

        // Логика
        function checkAuth() {
            if (document.getElementById('pass-input').value === "PNG BOSS 2026") {
                document.getElementById('admin-panel').style.display = 'block';
                window.isCommander = true;
            }
        }

        async function addNewLocation() {
            const name = document.getElementById('new-name').value.trim();
            const btn = document.getElementById('submit-btn');
            btn.disabled = true; btn.innerText = "ПОИСК...";
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(name)}&format=json&limit=1`, {
                    headers: { 'User-Agent': 'SquadStrategicMap/1.0' }
                });
                const data = await res.json();
                if (data.length > 0) {
                    db.ref('locations').push({ name, lat: data[0].lat, lon: data[0].lon });
                    document.getElementById('new-name').value = '';
                }
            } catch(e) { alert("Ошибка API"); }
            btn.disabled = false; btn.innerText = "ВНЕСТИ В РЕЕСТР";
        }

        db.ref('locations').on('value', snap => {
            const list = document.getElementById('cities-list');
            list.innerHTML = '';
            const data = snap.val() || {};
            document.getElementById('total-count').innerText = Object.keys(data).length;
            Object.keys(data).forEach(id => {
                list.innerHTML += `<div class="list-item"><span>${data[id].name}</span> ${window.isCommander ? `<span class="del-btn" onclick="db.ref('locations/${id}').remove()">×</span>` : ''}</div>`;
            });
        });
    </script>
</body>
</html>
