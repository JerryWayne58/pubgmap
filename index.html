<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Стратегическая Интерактивная Карта</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0d1117;
            color: #c9d1d9;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Боковая панель управления */
        #sidebar {
            width: 380px;
            background-color: #161b22;
            border-right: 1px solid #30363d;
            display: flex;
            flex-direction: column;
            padding: 20px;
            z-index: 1000;
            box-shadow: 4px 0 15px rgba(0,0,0,0.5);
        }

        h2 {
            color: #58a6ff;
            font-size: 1.4rem;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid #30363d;
            padding-bottom: 10px;
        }

        h3 {
            color: #8b949e;
            font-size: 1rem;
            margin: 15px 0 8px 0;
        }

        .control-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            color: #8b949e;
            margin-bottom: 5px;
        }

        input, select, button {
            width: 100%;
            padding: 10px;
            background-color: #21262d;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #f0f6fc;
            font-size: 0.9rem;
            margin-bottom: 10px;
            transition: all 0.2s ease;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #58a6ff;
            box-shadow: 0 0 0 3px rgba(88,166,255,0.15);
        }

        button {
            background-color: #238636;
            color: #ffffff;
            font-weight: bold;
            cursor: pointer;
            border: none;
        }

        button:hover {
            background-color: #2ea043;
        }

        button.secondary {
            background-color: #21262d;
            border: 1px solid #30363d;
            color: #c9d1d9;
        }

        button.secondary:hover {
            background-color: #30363d;
            border-color: #8b949e;
        }

        button.danger {
            background-color: #da3633;
        }

        button.danger:hover {
            background-color: #f85149;
        }

        .btn-row {
            display: flex;
            gap: 10px;
        }

        .btn-row div {
            flex: 1;
        }

        .btn-row button {
            flex: 1;
        }

        /* Админ-зона (по умолчанию скрыта) */
        .admin-only {
            display: none;
        }

        /* Список локаций */
        #location-list-container {
            flex: 1;
            overflow-y: auto;
            margin-top: 10px;
            border: 1px solid #30363d;
            border-radius: 6px;
            background-color: #0d1117;
        }

        .location-item {
            padding: 12px;
            border-bottom: 1px solid #30363d;
            cursor: pointer;
            transition: background-color 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .location-item:hover {
            background-color: #161b22;
        }

        .location-info {
            flex: 1;
        }

        .location-title {
            font-weight: bold;
            color: #f0f6fc;
            font-size: 0.95rem;
        }

        .location-coords {
            font-size: 0.8rem;
            color: #8b949e;
            margin-top: 3px;
        }

        .delete-btn {
            background: none;
            border: none;
            color: #f85149;
            cursor: pointer;
            font-size: 1.1rem;
            width: auto;
            margin: 0;
            padding: 0 5px;
            display: none;
        }

        .delete-btn:hover {
            color: #ff7b72;
            background: none;
        }

        /* Контейнер карты */
        #map {
            flex: 1;
            height: 100vh;
            background-color: #0b0e14;
        }

        /* Стилизация Leaflet */
        .leaflet-popup-content-wrapper, .leaflet-popup-tip {
            background: #161b22 !important;
            color: #f0f6fc !important;
            border: 1px solid #30363d;
            border-radius: 8px;
        }
        .leaflet-popup-close-button {
            color: #8b949e !important;
        }
        .leaflet-bar a {
            background-color: #161b22 !important;
            color: #c9d1d9 !important;
            border-bottom: 1px solid #30363d !important;
        }
        .leaflet-control-layers {
            background: #161b22 !important;
            color: #c9d1d9 !important;
            border: 1px solid #30363d !important;
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>Стратег-Панель</h2>
        
        <div class="control-group">
            <label for="admin-pass">Пароль администратора</label>
            <div class="btn-row" style="margin-bottom: 0;">
                <input type="password" id="admin-pass" placeholder="Введи пароль" style="margin-bottom: 0;">
                <button id="login-btn" style="width: auto; padding: 10px 15px;">Войти</button>
            </div>
        </div>

        <div class="control-group admin-only" id="add-form-block">
            <label for="point-name">Название объекта</label>
            <input type="text" id="point-name" placeholder="Введи название объекта">
            
            <div class="btn-row">
                <div>
                    <label for="point-lat">Широта (Lat)</label>
                    <input type="number" id="point-lat" step="0.000001" placeholder="Координата">
                </div>
                <div>
                    <label for="point-lon">Долгота (Lon)</label>
                    <input type="number" id="point-lon" step="0.000001" placeholder="Координата">
                </div>
            </div>

            <label for="point-radius">Радиус зоны (метров)</label>
            <input type="number" id="point-radius" placeholder="0" value="0">

            <button id="add-btn">Добавить объект</button>
        </div>

        <div class="admin-only" id="file-management-block">
            <h3>Управление данными (JSON)</h3>
            <div class="btn-row">
                <button class="secondary" id="export-btn">Экспорт</button>
                <button class="secondary" id="import-trigger-btn">Импорт</button>
            </div>
            <input type="file" id="import-file" accept=".json" style="display: none;">
            <button class="danger" id="clear-all-btn" style="margin-top: 5px;">Очистить карту</button>
        </div>

        <h3>Список объектов</h3>
        <div id="location-list-container">
            <div id="location-list"></div>
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <script>
        const CORRECT_PASSWORD = "admin"; // Пароль

        // Пресеты и стартовые точки чистые, как ты просил
        const PRESET_COORDINATES = {};
        const DEFAULT_LOCATIONS = [];

        const map = L.map('map').setView([48.0089, 37.8042], 6);

        // СЛОИ КАРТЫ
        // 1. Стандартная схема OpenStreetMap
        const osmLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 });

        // 2. Спутниковые снимки (чистый рельеф без подписей)
        const satelliteBase = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}');
        
        // 3. Слой прозрачных подписей (границы, города, трассы)
        const satelliteLabels = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Transportation/MapServer/tile/{z}/{y}/{x}');
        const satelliteBoundaries = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}');

        // Создаем полноценную "Гибридную" карту (Спутник + Подписи поверх него)
        const hybridLayer = L.layerGroup([satelliteBase, satelliteBoundaries, satelliteLabels]);
        
        // По умолчанию включаем гибридный спутник
        hybridLayer.addTo(map);

        // Панель переключения слоев в углу карты
        L.control.layers({ 
            "Спутник (с названиями)": hybridLayer, 
            "Стандартная схема": osmLayer 
        }, null, { position: 'topright' }).addTo(map);

        let locations = [];
        let isAdmin = false;

        // Авторизация
        function checkPassword() {
            const passInput = document.getElementById('admin-pass');
            if (passInput.value === CORRECT_PASSWORD) {
                isAdmin = true;
                document.getElementById('add-form-block').style.display = 'block';
                document.getElementById('file-management-block').style.display = 'block';
                document.querySelectorAll('.delete-btn').forEach(btn => btn.style.display = 'block');
                passInput.style.borderColor = '#238636';
            } else {
                alert("Неверный пароль администратора!");
            }
        }
        document.getElementById('login-btn').addEventListener('click', checkPassword);

        // Загрузка данных
        function loadData() {
            const saved = localStorage.getItem('strat_map_locations');
            if (saved) {
                try {
                    JSON.parse(saved).forEach(loc => addLocationToMapAndList(loc.name, loc.lat, loc.lon, loc.radius, false));
                } catch (e) { console.error(e); }
            } else {
                DEFAULT_LOCATIONS.forEach(loc => addLocationToMapAndList(loc.name, loc.lat, loc.lon, loc.radius, false));
                saveToLocalStorage();
            }
        }

        function saveToLocalStorage() {
            const data = locations.map(item => ({ name: item.name, lat: item.lat, lon: item.lon, radius: item.radius }));
            localStorage.setItem('strat_map_locations', JSON.stringify(data));
        }

        // Отрисовка маркеров и зон контроля
        function addLocationToMapAndList(name, lat, lon, radius, shouldSave = true) {
            const marker = L.marker([lat, lon]).addTo(map);
            marker.bindPopup(`<b>${name}</b><br>Lat: ${lat}<br>Lon: ${lon}${radius > 0 ? `<br>Радиус: ${radius}м` : ''}`);

            let circle = null;
            if (radius > 0) {
                // ЗДЕСЬ МЫ СДЕЛАЛИ ЗОНЫ БОЛЕЕ ЖИРНЫМИ И ЯРКИМИ
                circle = L.circle([lat, lon], {
                    radius: parseInt(radius), 
                    color: '#00f0ff',       // Неоновый едкий голубой контур
                    weight: 4,              // Толщина линии контура (было 2)
                    fillColor: '#00f0ff',   // Цвет заливки зоны
                    fillOpacity: 0.35       // Плотность заливки (было 0.15 — теперь в 2 раза гуще)
                }).addTo(map);
            }

            const id = Date.now() + Math.random().toString(36).substr(2, 5);
            locations.push({ id, name, lat, lon, radius, marker, circle });

            const listContainer = document.getElementById('location-list');
            const item = document.createElement('div');
            item.className = 'location-item';
            item.setAttribute('data-id', id);
            item.innerHTML = `
                <div class="location-info">
                    <div class="location-title">${name}</div>
                    <div class="location-coords">${lat.toFixed(4)}, ${lon.toFixed(4)}</div>
                </div>
                <button class="delete-btn" title="Удалить" style="display: ${isAdmin ? 'block' : 'none'}">×</button>
            `;

            item.addEventListener('click', (e) => {
                if (e.target.classList.contains('delete-btn')) return;
                map.flyTo([lat, lon], radius > 0 ? 10 : 13, { duration: 1.5 });
                marker.openPopup();
            });

            item.querySelector('.delete-btn').addEventListener('click', () => removeLocation(id));
            listContainer.appendChild(item);

            if (shouldSave) saveToLocalStorage();
        }

        function removeLocation(id) {
            const index = locations.findIndex(loc => loc.id === id);
            if (index !== -1) {
                const loc = locations[index];
                map.removeLayer(loc.marker);
                if (loc.circle) map.removeLayer(loc.circle);
                document.querySelector(`.location-item[data-id="${id}"]`).remove();
                locations.splice(index, 1);
                saveToLocalStorage();
            }
        }

        document.getElementById('add-btn').addEventListener('click', () => {
            const name = document.getElementById('point-name').value.trim() || "Новый объект";
            const lat = parseFloat(document.getElementById('point-lat').value);
            const lon = parseFloat(document.getElementById('point-lon').value);
            const radius = parseFloat(document.getElementById('point-radius').value) || 0;

            if (isNaN(lat) || isNaN(lon)) {
                alert("Ошибка: заполните поля широты и долготы вручную!");
                return;
            }

            addLocationToMapAndList(name, lat, lon, radius);
            map.flyTo([lat, lon], 11);

            document.getElementById('point-name').value = '';
            document.getElementById('point-lat').value = '';
            document.getElementById('point-lon').value = '';
            document.getElementById('point-radius').value = '0';
        });

        // Данные (Импорт / Экспорт / Очистка)
        document.getElementById('export-btn').addEventListener('click', () => {
            if (locations.length === 0) return;
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(locations.map(l => ({ name: l.name, lat: l.lat, lon: l.lon, radius: l.radius })), null, 4));
            const dl = document.createElement('a'); dl.setAttribute("href", dataStr); dl.setAttribute("download", "tactical_map.json"); dl.click();
        });

        document.getElementById('import-trigger-btn').addEventListener('click', () => document.getElementById('import-file').click());
        document.getElementById('import-file').addEventListener('change', function(e) {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = function(evt) {
                try {
                    const data = JSON.parse(evt.target.result);
                    if (Array.isArray(data)) {
                        data.forEach(loc => addLocationToMapAndList(loc.name, parseFloat(loc.lat), parseFloat(loc.lon), parseFloat(loc.radius || 0), false));
                        saveToLocalStorage();
                    }
                } catch (err) { alert("Ошибка JSON"); }
            };
            reader.readAsText(file);
        });

        document.getElementById('clear-all-btn').addEventListener('click', () => {
            if (confirm("Удалить вообще все точки с карты?")) {
                [...locations].forEach(loc => removeLocation(loc.id));
                localStorage.removeItem('strat_map_locations');
            }
        });

        window.onload = loadData;
    </script>
</body>
</html>
