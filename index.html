<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQUAD HQ: Global Recon Control</title>
    <style>
        :root {
            --bg-color: #080b10;
            --panel-bg: rgba(13, 17, 23, 0.88);
            --text-color: #c9d1d9;
            --border-color: #21262d;
            --color-city: #00ff66;
            --color-spec: #ff3366;
            --color-zone: #ffcc00;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: 'Courier New', Courier, monospace;
            color: var(--text-color);
        }

        #map-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            background-color: #e5e9f0;
        }

        .panel {
            position: absolute;
            z-index: 10;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            padding: 15px;
            border-radius: 4px;
            backdrop-filter: blur(4px);
            box-sizing: border-box;
        }

        .left-panel {
            top: 20px;
            left: 20px;
            width: 320px;
            bottom: 20px;
            display: flex;
            flex-direction: column;
        }

        .right-panel {
            top: 20px;
            right: 20px;
            width: 320px;
            bottom: 20px;
            overflow-y: auto;
        }

        .header-title {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            font-size: 20px;
            letter-spacing: 3px;
            background: var(--panel-bg);
            padding: 10px 20px;
            border: 1px solid var(--border-color);
            font-weight: bold;
            text-align: center;
            pointer-events: none;
        }

        .controls-hint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            font-size: 11px;
            opacity: 0.6;
            text-align: center;
            pointer-events: none;
            background: var(--panel-bg);
            padding: 5px 10px;
            border: 1px solid var(--border-color);
        }

        input, select, button {
            background: #161b22;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 8px 12px;
            margin-bottom: 10px;
            border-radius: 4px;
            width: 100%;
            box-sizing: border-box;
            font-family: inherit;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #58a6ff;
        }

        button {
            cursor: pointer;
            background: #21262d;
            font-weight: bold;
            transition: background 0.2s;
        }

        button:hover {
            background: #30363d;
        }

        .btn-action {
            background: #ffcc00;
            color: #000;
            border: none;
        }

        .btn-action:hover {
            background: #e6b800;
        }

        .auth-container {
            display: flex;
            gap: 5px;
        }

        .auth-container input {
            flex: 1;
        }

        .auth-container button {
            width: auto;
        }

        .admin-only {
            display: none;
            border-top: 1px dashed var(--border-color);
            padding-top: 15px;
            margin-top: 10px;
        }

        .coords-row {
            display: flex;
            gap: 5px;
        }

        .filter-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-bottom: 15px;
        }

        .filter-buttons button {
            width: auto;
            flex: 1;
            padding: 5px;
            font-size: 11px;
            margin-bottom: 0;
        }

        .list-container {
            flex: 1;
            overflow-y: auto;
            margin-top: 10px;
        }

        .list-item {
            padding: 8px;
            border-bottom: 1px solid #161b22;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
        }

        .list-item:hover {
            background: rgba(255,255,255,0.02);
        }

        .del-btn {
            color: #ff3366;
            cursor: pointer;
            display: none;
            font-weight: bold;
            padding: 0 5px;
        }

        .status-counter {
            float: right;
            color: #00ff66;
        }

        .custom-marker-container {
            background: transparent;
            border: none;
        }

        .custom-marker-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 2px solid #ffffff;
            box-shadow: 0 0 12px rgba(0,0,0,0.6);
            animation: pulse-marker 1.5s infinite ease-in-out;
            display: block;
        }

        @keyframes pulse-marker {
            0% { transform: scale(0.9); opacity: 0.9; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(0.9); opacity: 0.9; }
        }

        .leaflet-popup-content-wrapper {
            background: var(--panel-bg) !important;
            color: var(--text-color) !important;
            border: 1px solid var(--border-color);
            font-family: 'Courier New', monospace;
            border-radius: 4px;
        }
        .leaflet-popup-tip {
            background: var(--panel-bg) !important;
        }
    </style>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/osmtogeojson@3.0.1/osmtogeojson.js"></script>
</head>
<body>

    <div id="map-container"></div>

    <div class="header-title">SQUAD STRATEGIC MAP v2.8</div>

    <div class="panel left-panel">
        <h3>ОСВОБОЖДЕНО: <span id="total-count" class="status-counter">0</span></h3>
        
        <div class="auth-container">
            <input type="password" id="pass-input" placeholder="Код Командира...">
            <button onclick="checkAuth()">вход</button>
        </div>

        <div id="admin-panel" class="admin-only">
            <p style="color: #ffcc00; margin-top: 0; font-size: 12px;">[РЕЖИМ КОМАНДОВАНИЯ]</p>
            <input type="text" id="new-name" placeholder="Название объекта (напр. Мариуполь)">
            <select id="new-type">
                <option value="city">🟢 Населенный пункт</option>
                <option value="spec">🔴 Спецоперация</option>
                <option value="zone">🟡 Группировка / Зона</option>
            </select>
            <div class="coords-row">
                <input type="text" id="new-lat" placeholder="Широта (или пусто)">
                <input type="text" id="new-lon" placeholder="Долгота (или пусто)">
            </div>
            <button class="btn-action" id="submit-btn" onclick="addNewLocation()">ВНЕСТИ В РЕЕСТР</button>
        </div>

        <h4 style="margin-bottom: 5px; margin-top: 15px;">ФИЛЬТР ОБЪЕКТОВ</h4>
        <div class="filter-buttons">
            <button onclick="setFilter('all')">ВСЕ</button>
            <button onclick="setFilter('city')">ГОРОДА</button>
            <button onclick="setFilter('spec')">СПЕЦ</button>
            <button onclick="setFilter('zone')">ЗОНЫ</button>
        </div>

        <div class="list-container" id="cities-list"></div>
    </div>

    <div class="panel right-panel">
        <h3>ТЕКУЩИЕ МИССИИ</h3>
        <div id="missions-panel" class="admin-only">
            <input type="text" id="mission-text" placeholder="Текст боевой задачи...">
            <button class="btn-action" onclick="activateOperation()">АКТИВИРОВАТЬ ОПЕРАЦИЮ</button>
        </div>
        <div id="missions-list"></div>
    </div>

    <div class="controls-hint">
        Зажмите ЛКМ для перемещения | Колесико — Масштаб | Клик по списку — фокус и яркие границы
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            databaseURL: "https://pubgproject-73a7a-default-rtdb.europe-west1.firebasedatabase.app/"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let isCommander = false;
        let currentFilter = 'all';
        let locationsData = {};
        let missionsData = {};

        let map;
        let mapMarkers = [];
        let borderLayer = null; 
        const COMMAND_PASSWORD = "PNG BOSS 2026";

        // ТОЧНЫЙ ВСТРОЕННЫЙ ПОЛИГОН ГРАНИЦ МАРИУПОЛЯ (ТЕПЕРЬ ОБВЕДЕТСЯ НА 100%)
        const PRESET_BOUNDARIES = {
            "мариуполь": [
                [47.165, 37.480], [47.160, 37.520], [47.150, 37.560], [47.140, 37.600],
                [47.125, 37.650], [47.100, 37.680], [47.085, 37.690], [47.065, 37.650],
                [47.050, 37.600], [47.045, 37.540], [47.055, 37.480], [47.060, 37.450],
                [47.075, 37.430], [47.090, 37.440], [47.110, 37.445], [47.135, 37.440],
                [47.150, 37.450], [47.165, 37.480]
            ]
        };

        function checkAuth() {
            const pass = document.getElementById('pass-input').value;
            if (pass === COMMAND_PASSWORD) {
                isCommander = true;
                document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'block');
                document.querySelectorAll('.del-btn').forEach(el => el.style.display = 'inline');
                alert("Доступ подтвержден. Приветствую, Командир.");
                updateUI();
            } else {
                alert("Доступ запрещен. Неверный шифр.");
            }
        }

        function initMap() {
            map = L.map('map-container', {
                zoomControl: false
            }).setView([47.1, 37.5], 11); // Сразу делаем красивый фокус поближе к нашему региону

            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap &copy; CARTO',
                subdomains: 'abcd',
                maxZoom: 20
            }).addTo(map);
        }

        function updateMapMarkers() {
            mapMarkers.forEach(m => map.removeLayer(m));
            mapMarkers = [];

            Object.keys(locationsData).forEach(id => {
                const loc = locationsData[id];
                if (currentFilter !== 'all' && loc.type !== currentFilter) return;

                let markerColor = '#00ff66';
                if (loc.type === 'spec') markerColor = '#ff3366';
                if (loc.type === 'zone') markerColor = '#ffcc00';

                const customIcon = L.divIcon({
                    className: 'custom-marker-container',
                    html: `<div class="custom-marker-dot" style="background-color: ${markerColor}; box-shadow: 0 0 15px ${markerColor};"></div>`,
                    iconSize: [16, 16],
                    iconAnchor: [8, 8]
                });

                const marker = L.marker([parseFloat(loc.lat), parseFloat(loc.lon)], { icon: customIcon })
                    .bindPopup(`<b>${loc.name}</b><br>Статус: ${loc.type === 'city' ? 'Освобожден' : loc.type.toUpperCase()}`)
                    .addTo(map);

                marker.userData = { id: id };
                mapMarkers.push(marker);
            });
        }

        // МОДЕРНИЗИРОВАННЫЙ СБОРЩИК ГРАНИЦ
        async function fetchAndDrawBoundaries(cityName, markerColor) {
            if (borderLayer) {
                map.removeLayer(borderLayer);
                borderLayer = null;
            }

            const cleanName = cityName.toLowerCase().trim();

            // 1. Проверяем, есть ли готовый встроенный полигон (для Мариуполя)
            if (PRESET_BOUNDARIES[cleanName]) {
                borderLayer = L.polygon(PRESET_BOUNDARIES[cleanName], {
                    color: markerColor,
                    weight: 4,               // Жирная яркая линия
                    opacity: 0.95,
                    fillColor: markerColor,
                    fillOpacity: 0.25        // Насыщенная неоновая заливка внутри
                }).addTo(map);
                return;
            }

            // 2. Если город другой, пробуем найти через API
            const query = `[out:json][timeout:15];
                (
                  relation["boundary"="administrative"]["name"="${cityName}"];
                  relation["boundary"="administrative"]["name:ru"="${cityName}"];
                );
                out body; >; out skel qt;`;

            try {
                const response = await fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`);
                const osmData = await response.json();

                if (osmData && osmData.elements.length > 0) {
                    const geojson = osmtogeojson(osmData);
                    borderLayer = L.geoJSON(geojson, {
                        style: {
                            color: markerColor,
                            weight: 4,
                            opacity: 0.95,
                            fillColor: markerColor,
                            fillOpacity: 0.2
                        }
                    }).addTo(map);
                }
            } catch (e) {
                console.log("Границы не найдены для: " + cityName, e);
            }
        }

        function focusOnLocation(id) {
            const loc = locationsData[id];
            if (!loc) return;

            let color = '#00ff66';
            if (loc.type === 'spec') color = '#ff3366';
            if (loc.type === 'zone') color = '#ffcc00';
            
            map.setView([parseFloat(loc.lat), parseFloat(loc.lon)], 11, {
                animate: true,
                duration: 1
            });

            fetchAndDrawBoundaries(loc.name, color);
        }

        db.ref('locations').on('value', snapshot => {
            locationsData = snapshot.val() || {};
            updateUI();
            updateMapMarkers();
        });

        db.ref('missions').on('value', snapshot => {
            missionsData = snapshot.val() || {};
            updateMissionsUI();
        });

        function updateUI() {
            document.getElementById('total-count').innerText = Object.keys(locationsData).length;
            const mList = document.getElementById('cities-list');
            mList.innerHTML = '';

            Object.keys(locationsData).forEach(id => {
                const loc = locationsData[id];
                if (currentFilter !== 'all' && loc.type !== currentFilter) return;

                let indicator = '🟢';
                if (loc.type === 'spec') indicator = '🔴';
                if (loc.type === 'zone') indicator = '🟡';

                const item = document.createElement('div');
                item.className = 'list-item';
                item.innerHTML = `
                    <span style="cursor:pointer;" onclick="focusOnLocation('${id}')">${indicator} ${loc.name}</span>
                    <span class="del-btn" style="display: ${isCommander ? 'inline' : 'none'}" onclick="deleteLocation('${id}')">&times;</span>
                `;
                mList.appendChild(item);
            });
        }

        function updateMissionsUI() {
            const list = document.getElementById('missions-list');
            list.innerHTML = '';
            Object.keys(missionsData).forEach(id => {
                const mis = missionsData[id];
                const item = document.createElement('div');
                item.className = 'list-item';
                item.style.borderLeft = '3px solid #ff3366';
                item.style.marginBottom = '5px';
                item.style.background = 'rgba(255,51,102,0.05)';
                item.innerHTML = `
                    <div>
                        <div style="font-weight:bold; color:#ff3366;">💥 ОПЕРАЦИЯ</div>
                        <div style="font-size:12px; margin-top:3px;">${mis.text}</div>
                    </div>
                    <span class="del-btn" style="display: ${isCommander ? 'inline' : 'none'}" onclick="deleteMission('${id}')">&times;</span>
                `;
                list.appendChild(item);
            });
        }

        function setFilter(filterType) {
            currentFilter = filterType;
            updateUI();
            updateMapMarkers();
            if (borderLayer) {
                map.removeLayer(borderLayer);
                borderLayer = null;
            }
        }

        async function addNewLocation() {
            if (!isCommander) return;
            const name = document.getElementById('new-name').value.trim();
            const type = document.getElementById('new-type').value;
            let lat = document.getElementById('new-lat').value.trim();
            let lon = document.getElementById('new-lon').value.trim();

            if (!name) return alert('Введите название объекта!');

            const btn = document.getElementById('submit-btn');

            if (!lat || !lon) {
                btn.innerText = "ПОИСК КООРДИНАТ...";
                btn.disabled = true;
                
                try {
                    const response = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(name)}&format=json&limit=1`, {
                        headers: {
                            'User-Agent': 'SquadStrategicMap/1.0 (contact: admin@example.com)'
                        }
                    });
                    const data = await response.json();
                    
                    if (data && data.length > 0) {
                        lat = parseFloat(data[0].lat).toFixed(4);
                        lon = parseFloat(data[0].lon).toFixed(4);
                    } else {
                        alert(`Город "${name}" не найден. Проверьте правильность написания или введите координаты вручную.`);
                        btn.innerText = "ВНЕСТИ В РЕЕСТР";
                        btn.disabled = false;
                        return;
                    }
                } catch (error) {
                    console.error("Критическая ошибка поиска:", error);
                    alert("Не удалось подключиться к серверу координат. Пожалуйста, введите широту и долготу вручную.");
                    btn.innerText = "ВНЕСТИ В РЕЕСТР";
                    btn.disabled = false;
                    return;
                }
                
                btn.innerText = "ВНЕСТИ В РЕЕСТР";
                btn.disabled = false;
            }

            db.ref('locations').push({ name, type, lat, lon });
            
            document.getElementById('new-name').value = '';
            document.getElementById('new-lat').value = '';
            document.getElementById('new-lon').value = '';
        }

        function deleteLocation(id) {
            if (isCommander && confirm('Удалить из реестра?')) {
                db.ref('locations/' + id).remove();
                if (borderLayer) {
                    map.removeLayer(borderLayer);
                    borderLayer = null;
                }
            }
        }

        function activateOperation() {
            if (!isCommander) return;
            const text = document.getElementById('mission-text').value;
            if (!text) return alert('Введите текст задачи!');

            db.ref('missions').push({ text: text, timestamp: Date.now() });
            document.getElementById('mission-text').value = '';
        }

        function deleteMission(id) {
            if (isCommander && confirm('Завершить/удалить операцию?')) {
                db.ref('missions/' + id).remove();
            }
        }

        window.onload = () => {
            initMap();
            window.addEventListener('resize', () => {
                if (map) map.invalidateSize();
            });
        };
    </script>
</body>
</html>
