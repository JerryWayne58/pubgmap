<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Стратегическая Интерактивная Карта</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0d1117;
            color: #c9d1d9;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Боковая панель управления */
        #sidebar {
            width: 380px;
            background-color: #161b22;
            border-right: 1px solid #30363d;
            display: flex;
            flex-direction: column;
            padding: 20px;
            z-index: 1000;
            box-shadow: 4px 0 15px rgba(0,0,0,0.5);
        }

        h2 {
            color: #58a6ff;
            font-size: 1.4rem;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid #30363d;
            padding-bottom: 10px;
        }

        h3 {
            color: #8b949e;
            font-size: 1rem;
            margin: 15px 0 8px 0;
        }

        .control-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            color: #8b949e;
            margin-bottom: 5px;
        }

        input, select, button {
            width: 100%;
            padding: 10px;
            background-color: #21262d;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #f0f6fc;
            font-size: 0.9rem;
            margin-bottom: 10px;
            transition: all 0.2s ease;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #58a6ff;
            box-shadow: 0 0 0 3px rgba(88,166,255,0.15);
        }

        /* Кнопки фильтров */
        .filter-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 15px;
        }

        .filter-btn {
            padding: 8px;
            font-size: 0.8rem;
            background-color: #21262d;
            border: 1px solid #30363d;
            color: #c9d1d9;
            cursor: pointer;
            border-radius: 6px;
            font-weight: normal;
            margin-bottom: 0;
        }

        .filter-btn.active {
            background-color: #1f6feb;
            border-color: #58a6ff;
            color: #fff;
            font-weight: bold;
        }

        button.main-action {
            background-color: #238636;
            color: #ffffff;
            font-weight: bold;
            cursor: pointer;
            border: none;
        }

        button.main-action:hover {
            background-color: #2ea043;
        }

        button.secondary {
            background-color: #21262d;
            border: 1px solid #30363d;
            color: #c9d1d9;
        }

        button.secondary:hover {
            background-color: #30363d;
        }

        button.danger {
            background-color: #da3633;
        }

        button.danger:hover {
            background-color: #f85149;
        }

        .btn-row {
            display: flex;
            gap: 10px;
        }

        .btn-row div {
            flex: 1;
        }

        /* Админ-зона */
        .admin-only {
            display: none;
        }

        /* Список локаций */
        #location-list-container {
            flex: 1;
            overflow-y: auto;
            margin-top: 10px;
            border: 1px solid #30363d;
            border-radius: 6px;
            background-color: #0d1117;
        }

        .location-item {
            padding: 12px;
            border-bottom: 1px solid #30363d;
            cursor: pointer;
            transition: background-color 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .location-item:hover {
            background-color: #161b22;
        }

        .location-info {
            flex: 1;
        }

        .location-title {
            font-weight: bold;
            color: #f0f6fc;
            font-size: 0.95rem;
        }

        .location-meta {
            font-size: 0.8rem;
            color: #8b949e;
            margin-top: 3px;
            display: flex;
            justify-content: space-between;
        }

        .badge {
            font-size: 0.75rem;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
        }
        .badge-operation { background-color: #38235c; color: #d3bcf2; }
        .badge-mission { background-color: #1f6feb; color: #ffffff; }
        .badge-task { background-color: #9e6a00; color: #f8e3a1; }
        .badge-cleared { background-color: #238636; color: #ffffff; }

        .delete-btn {
            background: none;
            border: none;
            color: #f85149;
            cursor: pointer;
            font-size: 1.1rem;
            width: auto;
            margin: 0;
            padding: 0 5px;
            display: none;
        }

        .delete-btn:hover {
            color: #ff7b72;
        }

        /* Контейнер карты */
        #map {
            flex: 1;
            height: 100vh;
            background-color: #0b0e14;
        }

        /* Стилизация Leaflet */
        .leaflet-popup-content-wrapper, .leaflet-popup-tip {
            background: #161b22 !important;
            color: #f0f6fc !important;
            border: 1px solid #30363d;
            border-radius: 8px;
        }
        .leaflet-popup-close-button { color: #8b949e !important; }
        .leaflet-bar a {
            background-color: #161b22 !important;
            color: #c9d1d9 !important;
            border-bottom: 1px solid #30363d !important;
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>Стратег-Панель</h2>
        
        <div class="control-group">
            <label for="admin-pass">Пароль администратора</label>
            <div class="btn-row" style="margin-bottom: 0;">
                <input type="password" id="admin-pass" placeholder="Введи пароль" style="margin-bottom: 0;">
                <button id="login-btn" class="main-action" style="width: auto; padding: 10px 15px;">Войти</button>
            </div>
        </div>

        <h3>Фильтр задач</h3>
        <div class="filter-container">
            <button class="filter-btn active" data-filter="all">Все объекты</button>
            <button class="filter-btn" data-filter="operation">Спецоперации</button>
            <button class="filter-btn" data-filter="mission">Текущие миссии</button>
            <button class="filter-btn" data-filter="task">Спецзадания</button>
            <button class="filter-btn" data-filter="cleared">Освобождено</button>
        </div>

        <div class="control-group admin-only" id="add-form-block">
            <label for="point-name">Название объекта</label>
            <input type="text" id="point-name" placeholder="Название">
            
            <label for="point-category">Категория / Тип миссии</label>
            <select id="point-category">
                <option value="operation">Спецоперация</option>
                <option value="mission">Текущая миссия</option>
                <option value="task">Спецзадание</option>
                <option value="cleared">Освобождено</option>
            </select>

            <div class="btn-row">
                <div>
                    <label for="point-lat">Широта (Lat)</label>
                    <input type="number" id="point-lat" step="0.000001" placeholder="Координата">
                </div>
                <div>
                    <label for="point-lon">Долгота (Lon)</label>
                    <input type="number" id="point-lon" step="0.000001" placeholder="Координата">
                </div>
            </div>

            <label for="point-radius">Радиус области контроля (метров)</label>
            <input type="number" id="point-radius" placeholder="0" value="0">

            <button id="add-btn" class="main-action">Добавить на карту</button>
        </div>

        <div class="admin-only" id="file-management-block">
            <h3>Данные (JSON)</h3>
            <div class="btn-row">
                <button class="secondary" id="export-btn">Экспорт</button>
                <button class="secondary" id="import-trigger-btn">Импорт</button>
            </div>
            <input type="file" id="import-file" accept=".json" style="display: none;">
            <button class="danger" id="clear-all-btn" style="margin-top: 5px;">Очистить карту</button>
        </div>

        <h3>Список объектов</h3>
        <div id="location-list-container">
            <div id="location-list"></div>
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <script>
        const CORRECT_PASSWORD = "admin"; // Твой админ-пароль

        const map = L.map('map').setView([48.0089, 37.8042], 6);

        // КАРТООСНОВЫ: Google Спутник (Полностью на русском, высокая детализация подписей)
        const googleSatellite = L.tileLayer('https://mt1.google.com/vt/lyrs=y&hl=ru&x={x}&y={y}&z={z}', {
            maxZoom: 20,
            attribution: '© Google'
        });

        const osmLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 });
        
        // По умолчанию ставим качественный русский спутник Гугла
        googleSatellite.addTo(map);

        L.control.layers({ 
            "Google Спутник (Русский)": googleSatellite, 
            "Схема OSM": osmLayer 
        }, null, { position: 'topright' }).addTo(map);

        let locations = [];
        let isAdmin = false;
        let currentFilter = 'all';

        const categoryLabels = {
            operation: 'Спецоперация',
            mission: 'Текущая миссия',
            task: 'Спецзадание',
            cleared: 'Освобождено'
        };

        // Цветовая гамма для неброских, аккуратных тактических кругов областей
        const categoryColors = {
            operation: '#a371f7',
            mission: '#58a6ff',
            task: '#f2cc60',
            cleared: '#3fb950'
        };

        // Проверка пароля
        function checkPassword() {
            const passInput = document.getElementById('admin-pass');
            if (passInput.value === CORRECT_PASSWORD) {
                isAdmin = true;
                document.getElementById('add-form-block').style.display = 'block';
                document.getElementById('file-management-block').style.display = 'block';
                document.querySelectorAll('.delete-btn').forEach(btn => btn.style.display = 'block');
                passInput.style.borderColor = '#238636';
            } else {
                alert("Неверный пароль!");
            }
        }
        document.getElementById('login-btn').addEventListener('click', checkPassword);

        // Управление фильтрами
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentFilter = e.target.getAttribute('data-filter');
                renderMapAndList();
            });
        });

        // Загрузка
        function loadData() {
            const saved = localStorage.getItem('strat_map_locations');
            if (saved) {
                try {
                    locations = JSON.parse(saved).map(loc => ({
                        ...loc,
                        id: Date.now() + Math.random().toString(36).substr(2, 5),
                        marker: null,
                        circle: null
                    }));
                } catch (e) { console.error(e); locations = []; }
            }
            renderMapAndList();
        }

        function saveToLocalStorage() {
            const data = locations.map(item => ({ 
                name: item.name, lat: item.lat, lon: item.lon, radius: item.radius, category: item.category || 'operation' 
            }));
            localStorage.setItem('strat_map_locations', JSON.stringify(data));
        }

        // Общая функция отрисовки карты и списка с учетом фильтров
        function renderMapAndList() {
            // Чистим текущие маркеры с карты
            locations.forEach(loc => {
                if (loc.marker) map.removeLayer(loc.marker);
                if (loc.circle) map.removeLayer(loc.circle);
            });

            const listContainer = document.getElementById('location-list');
            listContainer.innerHTML = '';

            locations.forEach(loc => {
                const category = loc.category || 'operation';
                
                // Проверка фильтра
                if (currentFilter !== 'all' && currentFilter !== category) return;

                // Добавляем маркер на карту
                loc.marker = L.marker([loc.lat, loc.lon]).addTo(map);
                loc.marker.bindPopup(`<b>${loc.name}</b><br>Тип: ${categoryLabels[category]}<br>Lat: ${loc.lat}<br>Lon: ${loc.lon}`);

                // Добавляем аккуратный круг области контроля (Не выделяется сильно)
                if (loc.radius > 0) {
                    loc.circle = L.circle([loc.lat, loc.lon], {
                        radius: parseInt(loc.radius),
                        color: categoryColors[category], 
                        weight: 1.5,             // Тонкая линия границы
                        fillColor: categoryColors[category],
                        fillOpacity: 0.12        // Прозрачная легкая заливка
                    }).addTo(map);
                }

                // Добавляем в боковой список
                const item = document.createElement('div');
                item.className = 'location-item';
                item.innerHTML = `
                    <div class="location-info">
                        <div class="location-title">${loc.name}</div>
                        <div class="location-meta">
                            <span>${loc.lat.toFixed(4)}, ${loc.lon.toFixed(4)}</span>
                            <span class="badge badge-${category}">${categoryLabels[category]}</span>
                        </div>
                    </div>
                    <button class="delete-btn" title="Удалить" style="display: ${isAdmin ? 'block' : 'none'}">×</button>
                `;

                item.addEventListener('click', (e) => {
                    if (e.target.classList.contains('delete-btn')) return;
                    map.flyTo([loc.lat, loc.lon], loc.radius > 0 ? 11 : 13, { duration: 1.2 });
                    loc.marker.openPopup();
                });

                item.querySelector('.delete-btn').addEventListener('click', () => removeLocation(loc.id));
                listContainer.appendChild(item);
            });
        }

        function removeLocation(id) {
            const index = locations.findIndex(loc => loc.id === id);
            if (index !== -1) {
                const loc = locations[index];
                if (loc.marker) map.removeLayer(loc.marker);
                if (loc.circle) map.removeLayer(loc.circle);
                locations.splice(index, 1);
                saveToLocalStorage();
                renderMapAndList();
            }
        }

        // Кнопка добавления новой точки
        document.getElementById('add-btn').addEventListener('click', () => {
            const name = document.getElementById('point-name').value.trim() || "Новый объект";
            const category = document.getElementById('point-category').value;
            const lat = parseFloat(document.getElementById('point-lat').value);
            const lon = parseFloat(document.getElementById('point-lon').value);
            const radius = parseFloat(document.getElementById('point-radius').value) || 0;

            if (isNaN(lat) || isNaN(lon)) {
                alert("Укажите корректные координаты!");
                return;
            }

            const newLoc = {
                id: Date.now() + Math.random().toString(36).substr(2, 5),
                name, lat, lon, radius, category,
                marker: null, circle: null
            };

            locations.push(newLoc);
            saveToLocalStorage();
            renderMapAndList();

            map.flyTo([lat, lon], 11);

            document.getElementById('point-name').value = '';
            document.getElementById('point-lat').value = '';
            document.getElementById('point-lon').value = '';
            document.getElementById('point-radius').value = '0';
        });

        // Экспорт / Импорт / Очистка
        document.getElementById('export-btn').addEventListener('click', () => {
            if (locations.length === 0) return;
            const cleanData = locations.map(l => ({ name: l.name, lat: l.lat, lon: l.lon, radius: l.radius, category: l.category }));
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(cleanData, null, 4));
            const dl = document.createElement('a'); dl.setAttribute("href", dataStr); dl.setAttribute("download", "tactical_map.json"); dl.click();
        });

        document.getElementById('import-trigger-btn').addEventListener('click', () => document.getElementById('import-file').click());
        document.getElementById('import-file').addEventListener('change', function(e) {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = function(evt) {
                try {
                    const data = JSON.parse(evt.target.result);
                    if (Array.isArray(data)) {
                        locations = data.map(loc => ({
                            id: Date.now() + Math.random().toString(36).substr(2, 5),
                            name: loc.name, lat: parseFloat(loc.lat), lon: parseFloat(loc.lon), radius: parseFloat(loc.radius || 0), category: loc.category || 'operation',
                            marker: null, circle: null
                        }));
                        saveToLocalStorage();
                        renderMapAndList();
                    }
                } catch (err) { alert("Ошибка JSON структуры"); }
            };
            reader.readAsText(file);
        });

        document.getElementById('clear-all-btn').addEventListener('click', () => {
            if (confirm("Полностью очистить все точки?")) {
                locations.forEach(loc => {
                    if (loc.marker) map.removeLayer(loc.marker);
                    if (loc.circle) map.removeLayer(loc.circle);
                });
                locations = [];
                localStorage.removeItem('strat_map_locations');
                renderMapAndList();
            }
        });

        window.onload = loadData;
    </script>
</body>
</html>
