<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQUAD HQ: Global Recon Control</title>
    <style>
        :root {
            --bg-color: #080b10;
            --panel-bg: rgba(13, 17, 23, 0.88);
            --text-color: #c9d1d9;
            --border-color: #21262d;
            --color-city: #00ff66;
            --color-spec: #ff3366;
            --color-zone: #ffcc00;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: 'Courier New', Courier, monospace;
            color: var(--text-color);
        }

        #canvas-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .panel {
            position: absolute;
            z-index: 10;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            padding: 15px;
            border-radius: 4px;
            backdrop-filter: blur(4px);
            box-sizing: border-box;
        }

        .left-panel {
            top: 20px;
            left: 20px;
            width: 320px;
            bottom: 20px;
            display: flex;
            flex-direction: column;
        }

        .right-panel {
            top: 20px;
            right: 20px;
            width: 320px;
            bottom: 20px;
            overflow-y: auto;
        }

        .header-title {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            font-size: 20px;
            letter-spacing: 3px;
            background: var(--panel-bg);
            padding: 10px 20px;
            border: 1px solid var(--border-color);
            font-weight: bold;
            text-align: center;
        }

        .controls-hint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            font-size: 11px;
            opacity: 0.6;
            text-align: center;
            pointer-events: none;
        }

        input, select, button {
            background: #161b22;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 8px 12px;
            margin-bottom: 10px;
            border-radius: 4px;
            width: 100%;
            box-sizing: border-box;
            font-family: inherit;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #58a6ff;
        }

        button {
            cursor: pointer;
            background: #21262d;
            font-weight: bold;
            transition: background 0.2s;
        }

        button:hover {
            background: #30363d;
        }

        .btn-action {
            background: #ffcc00;
            color: #000;
            border: none;
        }

        .btn-action:hover {
            background: #e6b800;
        }

        .auth-container {
            display: flex;
            gap: 5px;
        }

        .auth-container input {
            flex: 1;
        }

        .auth-container button {
            width: auto;
        }

        .admin-only {
            display: none;
            border-top: 1px dashed var(--border-color);
            padding-top: 15px;
            margin-top: 10px;
        }

        .coords-row {
            display: flex;
            gap: 5px;
        }

        .filter-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-bottom: 15px;
        }

        .filter-buttons button {
            width: auto;
            flex: 1;
            padding: 5px;
            font-size: 11px;
            margin-bottom: 0;
        }

        .list-container {
            flex: 1;
            overflow-y: auto;
            margin-top: 10px;
        }

        .list-item {
            padding: 8px;
            border-bottom: 1px solid #161b22;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
        }

        .list-item:hover {
            background: rgba(255,255,255,0.02);
        }

        .del-btn {
            color: #ff3366;
            cursor: pointer;
            display: none;
            font-weight: bold;
            padding: 0 5px;
        }

        .status-counter {
            float: right;
            color: #00ff66;
        }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <div id="canvas-container"></div>

    <div class="header-title">SQUAD STRATEGIC MAP v2.0</div>

    <div class="panel left-panel">
        <h3>ОСВОБОЖДЕНО: <span id="total-count" class="status-counter">0</span></h3>
        
        <div class="auth-container">
            <input type="password" id="pass-input" placeholder="Код Командира...">
            <button onclick="checkAuth()">вход</button>
        </div>

        <div id="admin-panel" class="admin-only">
            <p style="color: #ffcc00; margin-top: 0; font-size: 12px;">[РЕЖИМ КОМАНДОВАНИЯ]</p>
            <input type="text" id="new-name" placeholder="Название объекта (напр. Мариуполь)">
            <select id="new-type">
                <option value="city">🟢 Населенный пункт</option>
                <option value="spec">🔴 Спецоперация</option>
                <option value="zone">🟡 Группировка / Зона</option>
            </select>
            <div class="coords-row">
                <input type="text" id="new-lat" placeholder="Широта (или пусто)">
                <input type="text" id="new-lon" placeholder="Долгота (или пусто)">
            </div>
            <button class="btn-action" id="submit-btn" onclick="addNewLocation()">ВНЕСТИ В РЕЕСТР</button>
        </div>

        <h4 style="margin-bottom: 5px; margin-top: 15px;">ФИЛЬТР ОБЪЕКТОВ</h4>
        <div class="filter-buttons">
            <button onclick="setFilter('all')">ВСЕ</button>
            <button onclick="setFilter('city')">ГОРОДА</button>
            <button onclick="setFilter('spec')">СПЕЦ</button>
            <button onclick="setFilter('zone')">ЗОНЫ</button>
        </div>

        <div class="list-container" id="cities-list"></div>
    </div>

    <div class="panel right-panel">
        <h3>ТЕКУЩИЕ МИССИИ</h3>
        <div id="missions-panel" class="admin-only">
            <input type="text" id="mission-text" placeholder="Текст боевой задачи...">
            <button class="btn-action" onclick="activateOperation()">АКТИВИРОВАТЬ ОПЕРАЦИЮ</button>
        </div>
        <div id="missions-list"></div>
    </div>

    <div class="controls-hint">
        ЛКМ — вращение | Колесико — Зум | Клик по списку — фокус
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            databaseURL: "https://pubgproject-73a7a-default-rtdb.europe-west1.firebasedatabase.app/"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let isCommander = false;
        let currentFilter = 'all';
        let locationsData = {};
        let missionsData = {};

        let scene, camera, renderer, globe, controls;
        const markers = [];
        const globeRadius = 5;
        const COMMAND_PASSWORD = "PNG BOSS 2026";

        function checkAuth() {
            const pass = document.getElementById('pass-input').value;
            if (pass === COMMAND_PASSWORD) {
                isCommander = true;
                document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'block');
                document.querySelectorAll('.del-btn').forEach(el => el.style.display = 'inline');
                alert("Доступ подтвержден. Приветствую, Командир.");
                updateUI();
            } else {
                alert("Доступ запрещен. Неверный шифр.");
            }
        }

        function init3D() {
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene();

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 15);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.minDistance = 6;
            controls.maxDistance = 25;

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambientLight);

            const dirLight1 = new THREE.DirectionalLight(0xffffff, 0.4);
            dirLight1.position.set(5, 3, 5);
            scene.add(dirLight1);

            const dirLight2 = new THREE.DirectionalLight(0xffffff, 0.3);
            dirLight2.position.set(-5, -3, -5);
            scene.add(dirLight2);

            const geometry = new THREE.SphereGeometry(globeRadius, 64, 64);
            const textureLoader = new THREE.TextureLoader();
            const earthTexture = textureLoader.load('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg');

            const material = new THREE.MeshPhongMaterial({
                map: earthTexture,
                specular: 0x222222,
                shininess: 15
            });

            globe = new THREE.Mesh(geometry, material);
            scene.add(globe);

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            
            if (controls.state === -1) {
                globe.rotation.y += 0.0003;
            }

            const time = Date.now() * 0.006;
            markers.forEach(m => {
                const scale = 1 + Math.sin(time + m.userData.phase) * 0.2;
                m.scale.set(scale, scale, scale);
            });

            controls.update();
            renderer.render(scene, camera);
        }

        function latLonToVector3(lat, lon, radius) {
            const phi = (90 - lat) * (Math.PI / 180);
            const theta = (lon + 180) * (Math.PI / 180);

            const x = -(radius * Math.sin(phi) * Math.sin(theta));
            const y = radius * Math.cos(phi);
            const z = radius * Math.sin(phi) * Math.cos(theta);

            return new THREE.Vector3(x, y, z);
        }

        function update3DMarkers() {
            markers.forEach(m => scene.remove(m));
            markers.length = 0;

            Object.keys(locationsData).forEach(id => {
                const loc = locationsData[id];
                if (currentFilter !== 'all' && loc.type !== currentFilter) return;

                let color = 0x00ff66;
                if (loc.type === 'spec') color = 0xff3366;
                if (loc.type === 'zone') color = 0xffcc00;

                const markerGeo = new THREE.SphereGeometry(0.14, 16, 16);
                const markerMat = new THREE.MeshBasicMaterial({ color: color });
                const markerMesh = new THREE.Mesh(markerGeo, markerMat);

                const pos = latLonToVector3(parseFloat(loc.lat), parseFloat(loc.lon), globeRadius + 0.05);
                markerMesh.position.copy(pos);
                
                markerMesh.userData = { id: id, phase: Math.random() * 10, coords: pos };
                
                scene.add(markerMesh);
                markers.push(markerMesh);
            });
        }

        function focusOnLocation(id) {
            const loc = locationsData[id];
            if (!loc) return;
            const pos = latLonToVector3(parseFloat(loc.lat), parseFloat(loc.lon), globeRadius + 3.5);
            camera.position.copy(pos);
            controls.target.set(0,0,0);
        }

        db.ref('locations').on('value', snapshot => {
            locationsData = snapshot.val() || {};
            updateUI();
            update3Markers();
        });

        db.ref('missions').on('value', snapshot => {
            missionsData = snapshot.val() || {};
            updateMissionsUI();
        });

        function updateUI() {
            document.getElementById('total-count').innerText = Object.keys(locationsData).length;
            const mList = document.getElementById('cities-list');
            mList.innerHTML = '';

            Object.keys(locationsData).forEach(id => {
                const loc = locationsData[id];
                if (currentFilter !== 'all' && loc.type !== currentFilter) return;

                let indicator = '🟢';
                if (loc.type === 'spec') indicator = '🔴';
                if (loc.type === 'zone') indicator = '🟡';

                const item = document.createElement('div');
                item.className = 'list-item';
                item.innerHTML = `
                    <span style="cursor:pointer;" onclick="focusOnLocation('${id}')">${indicator} ${loc.name}</span>
                    <span class="del-btn" style="display: ${isCommander ? 'inline' : 'none'}" onclick="deleteLocation('${id}')">&times;</span>
                `;
                mList.appendChild(item);
            });
        }

        function updateMissionsUI() {
            const list = document.getElementById('missions-list');
            list.innerHTML = '';
            Object.keys(missionsData).forEach(id => {
                const mis = missionsData[id];
                const item = document.createElement('div');
                item.className = 'list-item';
                item.style.borderLeft = '3px solid #ff3366';
                item.style.marginBottom = '5px';
                item.style.background = 'rgba(255,51,102,0.05)';
                item.innerHTML = `
                    <div>
                        <div style="font-weight:bold; color:#ff3366;">💥 ОПЕРАЦИЯ</div>
                        <div style="font-size:12px; margin-top:3px;">${mis.text}</div>
                    </div>
                    <span class="del-btn" style="display: ${isCommander ? 'inline' : 'none'}" onclick="deleteMission('${id}')">&times;</span>
                `;
                list.appendChild(item);
            });
        }

        function setFilter(filterType) {
            currentFilter = filterType;
            updateUI();
            update3DMarkers();
        }

        // ЖЕСТКИЙ И НАДЕЖНЫЙ ПОИСК ЧЕРЕЗ ПРЯМОЙ СЕРВЕР ОБРАБОТКИ OSM
        async function addNewLocation() {
            if (!isCommander) return;
            const name = document.getElementById('new-name').value.trim();
            const type = document.getElementById('new-type').value;
            let lat = document.getElementById('new-lat').value.trim();
            let lon = document.getElementById('new-lon').value.trim();

            if (!name) return alert('Введите название объекта!');

            const btn = document.getElementById('submit-btn');

            if (!lat || !lon) {
                btn.innerText = "ПОИСК КООРДИНАТ...";
                btn.disabled = true;
                
                try {
                    // Используем стабильный публичный эндпоинт без ограничений по CORS заголовкам
                    const response = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(name)}&format=json&limit=1`);
                    const data = await response.json();
                    
                    if (data && data.length > 0) {
                        lat = parseFloat(data[0].lat).toFixed(4);
                        lon = parseFloat(data[0].lon).toFixed(4);
                    } else {
                        alert(`Город "${name}" не найден. Проверьте правильность написания или введите координаты вручную.`);
                        btn.innerText = "ВНЕСТИ В РЕЕСТР";
                        btn.disabled = false;
                        return;
                    }
                } catch (error) {
                    console.error("Критическая ошибка поиска:", error);
                    alert("Не удалось подключиться к серверу координат. Пожалуйста, введите широту и долготу вручную.");
                    btn.innerText = "ВНЕСТИ В РЕЕСТР";
                    btn.disabled = false;
                    return;
                }
                
                btn.innerText = "ВНЕСТИ В РЕЕСТР";
                btn.disabled = false;
            }

            db.ref('locations').push({ name, type, lat, lon });
            
            document.getElementById('new-name').value = '';
            document.getElementById('new-lat').value = '';
            document.getElementById('new-lon').value = '';
        }

        function deleteLocation(id) {
            if (isCommander && confirm('Удалить из реестра?')) {
                db.ref('locations/' + id).remove();
            }
        }

        function activateOperation() {
            if (!isCommander) return;
            const text = document.getElementById('mission-text').value;
            if (!text) return alert('Введите текст задачи!');

            db.ref('missions').push({ text: text, timestamp: Date.now() });
            document.getElementById('mission-text').value = '';
        }

        function deleteMission(id) {
            if (isCommander && confirm('Завершить/удалить операцию?')) {
                db.ref('missions/' + id).remove();
            }
        }

        window.onload = () => {
            init3D();
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        };
    </script>
</body>
</html>
